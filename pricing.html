<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pricing</title>
  <meta name="description" content="Pricing page." />
  <style>
    :root {
      color-scheme: light dark;
      --bg: #020617;
      --panel: rgba(15, 23, 42, 0.76);
      --panel-border: rgba(148, 163, 184, 0.22);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #93c5fd;
      --button: #f8fafc;
      --button-text: #020617;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--bg);
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59, 130, 246, 0.22), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(168, 85, 247, 0.16), transparent 34rem),
        linear-gradient(135deg, #020617, #0f172a 52%, #111827);
      color: var(--text);
    }

    .shell {
      width: min(1040px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0 72px;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      justify-content: flex-end;
      margin-bottom: 42px;
    }

    .nav a {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 999px;
      padding: 0 14px;
      color: var(--muted);
      text-decoration: none;
      background: rgba(15, 23, 42, 0.44);
    }

    .nav a:hover {
      color: var(--text);
      border-color: rgba(248, 250, 252, 0.36);
    }

    main {
      display: grid;
      min-height: calc(100vh - 160px);
      place-items: center;
    }

    .card {
      width: 100%;
      border: 1px solid var(--panel-border);
      border-radius: 30px;
      padding: clamp(28px, 7vw, 64px);
      background: var(--panel);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(18px);
    }

    .eyebrow {
      margin: 0 0 16px;
      color: var(--accent);
      font-weight: 800;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      font-size: 0.78rem;
    }

    h1 {
      max-width: 800px;
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5.5rem);
      line-height: 0.95;
      letter-spacing: -0.065em;
    }

    p {
      max-width: 720px;
      color: var(--muted);
      font-size: clamp(1rem, 2vw, 1.12rem);
      line-height: 1.75;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .button {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 0 18px;
      background: var(--button);
      color: var(--button-text);
      text-decoration: none;
      font-weight: 850;
    }

    .button.secondary {
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(148, 163, 184, 0.12);
      color: var(--text);
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 24px, 1040px);
        padding-top: 18px;
      }

      .nav {
        justify-content: flex-start;
        margin-bottom: 24px;
      }

      .card {
        border-radius: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <nav class="nav" aria-label="Primary navigation">
      <a href="index.html">Index</a>
    </nav>
    <main>
      <section class="card" aria-labelledby="page-title">
        <p class="eyebrow">Website Page</p>
        <h1 id="page-title">Pricing</h1>
        <p>Compare available plans, choose the option that fits your needs, and continue with confidence.</p>
        <div class="actions">
          <a class="button" href="index.html">Back Home</a>
<a class="button secondary" href="#page-title">Explore</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
